<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赛博盆栽 · 每日情绪花</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="petal-canvas" aria-hidden="true"></canvas>

  <div class="overlay" id="adopt-overlay" hidden>
    <div class="card">
      <h2>领养一颗种子</h2>
      <p class="card-desc">每日记录心情，同一颗种子会因情绪长成 3 种赛博形态之一。</p>
      <div class="seed-preview"><img id="preview-img" src="background.png" alt="种子预览" width="200" height="200" /></div>
      <p class="seed-name" id="preview-name">—</p>
      <p class="seed-origin" id="preview-origin">—</p>
      <button type="button" class="btn-primary" id="btn-adopt">领养这株</button>
      <button type="button" class="btn-ghost" id="btn-reroll">换一颗</button>
    </div>
  </div>

  <div class="overlay" id="abandon-overlay" hidden>
    <div class="card card-wide">
      <h2 id="abandon-title">花架已满（5/5）</h2>
      <p class="card-desc">请选择一株放弃，为新花腾出位置。</p>
      <ul class="abandon-list" id="abandon-list"></ul>
      <button type="button" class="btn-ghost" id="btn-abandon-cancel">暂不收入</button>
    </div>
  </div>

  <div class="overlay" id="shelf-view-overlay" hidden>
    <div class="card card-shelf-view">
      <button type="button" class="shelf-view-close" id="btn-shelf-view-close" aria-label="关闭">×</button>
      <div class="shelf-view-frame">
        <img class="shelf-view-img" id="shelf-view-img" alt="" />
      </div>
      <div class="shelf-view-meta">
        <h2 id="shelf-view-name"></h2>
        <p id="shelf-view-form"></p>
      </div>
      <button type="button" class="btn-primary" id="btn-shelf-care">今日照料</button>
    </div>
  </div>

  <main class="view app" id="view-home" hidden>
    <header class="header">
      <h1>赛博盆栽</h1>
      <p class="subtitle">每日情绪打卡</p>
      <nav class="nav-row">
        <button type="button" class="nav-btn" id="btn-goto-shelf">花架</button>
        <button type="button" class="nav-btn" id="btn-goto-codex">图鉴</button>
      </nav>
    </header>

    <div class="flower-meta">
      <p class="flower-name" id="flower-name">—</p>
      <p class="flower-stage" id="flower-stage">—</p>
    </div>

    <section class="grow-stage" id="grow-stage" aria-label="木盆培育区">
      <div class="growth-scene" id="growth-scene" role="img" aria-live="polite" aria-label="生长场景"></div>
      <div class="pot-hit" id="pot-wrap" role="button" tabindex="0" aria-label="轻触木盆照料"></div>
      <p class="pot-hint">轻触木盆照料 · 记录心情促进生长</p>
    </section>

    <p class="status-banner" id="status-banner" hidden></p>

    <div class="home-bottom-dock">
      <p class="message" id="message" aria-live="polite"></p>

      <div class="shelf-prompt" id="shelf-prompt" hidden>
        <p class="shelf-prompt-text">完全体已绽放，是否收入阳光房花架？</p>
        <div class="shelf-prompt-actions">
          <button type="button" class="btn-shelf-yes" id="btn-shelf-yes">收入花架</button>
          <button type="button" class="btn-shelf-later" id="btn-shelf-later">稍后再说</button>
        </div>
      </div>

      <section class="mood-panel">
        <div class="mood-panel-row">
          <span class="mood-title">今日心情</span>
          <div class="mood-grid" id="mood-grid"></div>
        </div>
        <p class="cooldown-text" id="cooldown-text"></p>
      </section>

      <section class="progress-section">
        <div class="progress-header">
          <span>赛博进化</span>
          <span id="progress-label">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </section>
    </div>
  </main>

  <main class="view greenhouse" id="view-shelf" hidden>
    <div class="gh-room">
      <header class="header compact gh-header">
        <button type="button" class="back-btn" id="btn-back-home">← 返回培育</button>
        <h1>阳光房花架</h1>
        <p class="subtitle">已收藏 <span id="shelf-count">0</span> / <span id="shelf-max">5</span> · 点击盆花查看完整形态</p>
      </header>

      <div class="gh-stage">
        <div class="shelf-slots" id="shelf-layers" aria-label="五格花架"></div>
      </div>

      <footer class="gh-footer">
        <p class="shelf-hint" id="shelf-hint">左二右三共五格 · 满架时需放弃一株才能收入新花</p>
        <p class="message shelf-message" id="shelf-message"></p>
      </footer>
    </div>
  </main>

  <main class="view codex-view" id="view-codex" hidden>
    <div class="codex-page">
      <header class="codex-header">
        <button type="button" class="back-btn" id="btn-back-home2">← 返回培育</button>
        <h1>赛博图鉴</h1>
        <p class="codex-subtitle">
          已解锁 <span id="codex-count">0</span> / <span id="codex-total">6</span> 种
          <span class="codex-subtitle-dot">·</span>
          每种 3 形态
        </p>
      </header>
      <div class="codex-grid" id="codex-grid" aria-label="赛博花种图鉴"></div>
    </div>
  </main>

  <script src="plants.js"></script>
  <script src="growth.js"></script>
  <script src="game.js"></script>
</body>
</html>
